name: Scrape Jobs + Publish

# develop = queue (curators + community + scrape workspace)
# master  = public board (git)
# GitHub Pages = interactive board from master's docs/

on:
  schedule:
    - cron: '0 9 * * *'  # 9 AM UTC daily — no prompts
  workflow_dispatch:
    inputs:
      force_linkedin:
        description: 'Optional. Force LinkedIn scrape even if profiles are not due (ignore if you are not using LinkedIn).'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_publish_master:
        description: 'Only update develop (skip merge to master + Pages).'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Decide whether LinkedIn scrape is due
        id: linkedin
        env:
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_LI_AT_POOL: ${{ secrets.LINKEDIN_LI_AT_POOL }}
          LINKEDIN_LI_AT_2: ${{ secrets.LINKEDIN_LI_AT_2 }}
          FORCE_LINKEDIN: ${{ github.event.inputs.force_linkedin || 'false' }}
        run: |
          if python -c "from pipeline.sources.linkedin_rss import should_scrape_any; import sys; sys.exit(0 if should_scrape_any() else 1)"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "LinkedIn scrape is due this run"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "LinkedIn scrape skipped (not due / no cookies / not forced)"
          fi

      - name: Install Playwright (LinkedIn only)
        if: steps.linkedin.outputs.run == 'true'
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python -m pipeline.scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_LI_AT_POOL: ${{ secrets.LINKEDIN_LI_AT_POOL }}
          LINKEDIN_LI_AT_2: ${{ secrets.LINKEDIN_LI_AT_2 }}
          FORCE_LINKEDIN: ${{ github.event.inputs.force_linkedin || 'false' }}

      - name: Commit on develop (if changed)
        id: commit
        run: |
          AUTHOR_NAME=$(python -c "import json; print(json.load(open('sources/config.json'))['commit_author']['name'])")
          AUTHOR_EMAIL=$(python -c "import json; print(json.load(open('sources/config.json'))['commit_author']['email'])")
          git config user.name "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No scrape output changes"
            exit 0
          fi
          git commit --author="${AUTHOR_NAME} <${AUTHOR_EMAIL}>" \
            -m "chore: update job listings $(date -u +%Y-%m-%d)"
          git push origin develop
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Publish develop → master (public board)
        id: publish
        if: ${{ github.event.inputs.skip_publish_master != 'true' }}
        run: |
          AUTHOR_NAME=$(python -c "import json; print(json.load(open('sources/config.json'))['commit_author']['name'])")
          AUTHOR_EMAIL=$(python -c "import json; print(json.load(open('sources/config.json'))['commit_author']['email'])")
          git config user.name "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"
          git fetch origin master develop
          git checkout master
          git pull origin master
          if git merge --ff-only origin/develop; then
            echo "master fast-forwarded to develop"
          else
            git merge origin/develop -m "chore: publish develop to master $(date -u +%Y-%m-%d)"
          fi
          git push origin master
          git checkout develop
          git pull origin develop
          git merge --ff-only origin/master || git merge origin/master -m "chore: sync develop with master after publish"
          git push origin develop
          echo "master is public; develop queue tip synced"
          echo "published=true" >> "$GITHUB_OUTPUT"

  deploy-pages:
    name: Deploy GitHub Pages (from master)
    needs: scrape-and-publish
    # Always publish the live site after a successful scrape (unless skip_publish_master).
    if: ${{ always() && needs.scrape-and-publish.result == 'success' && github.event.inputs.skip_publish_master != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout master docs
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Ensure Pages entrypoints
        run: |
          test -f docs/board.html
          if [ ! -f docs/index.html ]; then
            cp docs/board.html docs/index.html
          fi
          touch docs/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
