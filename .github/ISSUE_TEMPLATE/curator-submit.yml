name: Curator submission
description: Paste a LinkedIn hiring post as-is. We extract apply links and push jobs to the board.
title: "Curator: add hiring post"
labels: ["curator-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Paste the **full LinkedIn post text** (with apply links). We parse roles/companies/URLs
        into your curator folder on `develop`, then publish to `master`.

        You need a curator id + passphrase from maintainers (stored privately — never re-post it in comments).

  - type: input
    id: curator_id
    attributes:
      label: Curator ID
      description: Registered id (example eshwarchandravidhyasagar) or your LinkedIn profile URL.
      placeholder: "eshwarchandravidhyasagar"
    validations:
      required: true

  - type: input
    id: curator_key
    attributes:
      label: Curator key
      description: Private passphrase from maintainers. It is redacted from the issue as soon as processing starts.
      placeholder: "your-passphrase"
    validations:
      required: true

  - type: textarea
    id: raw_post
    attributes:
      label: LinkedIn post content
      description: Paste the post as-is, including every apply / careers link.
      placeholder: "Hiring Software Engineer Intern at Acme… https://boards.greenhouse.io/acme/jobs/123"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Application URL (optional override)
      description: Only if the pasted post has no clear apply link.
      placeholder: "https://boards.greenhouse.io/..."
    validations:
      required: false

  - type: input
    id: name
    attributes:
      label: Your name (optional)
      placeholder: "Eshwar Chandra Vidhyasagar"
    validations:
      required: false

  - type: input
    id: github
    attributes:
      label: GitHub username (optional)
      description: Used to attribute the git commit to you. If omitted, we use the GitHub account that opened this issue.
      placeholder: "EshwarCVS"
    validations:
      required: false

  - type: input
    id: linkedin_url
    attributes:
      label: LinkedIn profile URL (optional)
      placeholder: "https://www.linkedin.com/in/eshwarchandravidhyasagar/"
    validations:
      required: false

  - type: input
    id: date
    attributes:
      label: Date posted (optional)
      description: YYYY-MM-DD — defaults to today; controls year/month folder.
      placeholder: "2026-07-15"
    validations:
      required: false
