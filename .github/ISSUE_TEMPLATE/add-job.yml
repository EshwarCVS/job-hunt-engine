name: Add Job Listing
description: Submit a job listing to be added to the board
title: "Add: [Company] — [Role]"
labels: ["job-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing a listing. A **maintainer reviews** this issue before
        anything is added to the board (we do not auto-merge public job issues).

        Prefer a PR to `sources/community-jobs.json` if you are comfortable with git.
        Trusted curators should use the **Curator submission** template instead.

  - type: input
    id: title
    attributes:
      label: Job Title
      placeholder: "e.g., Software Engineer"
    validations:
      required: true

  - type: input
    id: company
    attributes:
      label: Company Name
      placeholder: "e.g., Google"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Application URL
      placeholder: "https://careers.google.com/..."
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      placeholder: "e.g., Mountain View, CA or Remote"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Software Engineering
        - Frontend
        - Backend
        - Full Stack
        - Data/ML
        - DevOps/Infra
        - Mobile
        - Security
        - Embedded/HW
        - Internship
    validations:
      required: true

  - type: dropdown
    id: work_model
    attributes:
      label: Work Model
      options:
        - On Site
        - Hybrid
        - Remote
        - Not Sure
    validations:
      required: true

  - type: input
    id: info
    attributes:
      label: Additional Info
      description: "H1B sponsorship, seniority level, degree requirements, etc."
      placeholder: "e.g., H1B Sponsor, Senior level"
    validations:
      required: false

  - type: input
    id: github
    attributes:
      label: GitHub username (optional)
      description: So maintainers can attribute the commit to you when merging. Defaults to the account that opened this issue.
      placeholder: "EshwarCVS"
    validations:
      required: false
